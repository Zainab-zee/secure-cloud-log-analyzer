<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Secure Cloud Log Analyzer</h1>

    <div class="card">
        <h2>Welcome Admin</h2>
        <p>
            Upload raw cloud/server log files, process them using MapReduce,
            and view HTTP error frequencies and traffic peak hours.
        </p>

        <a href="/upload">
            <button>Upload Log File</button>
        </a>

        <a href="/logout">
            <button>Logout</button>
        </a>
    </div>

    <div class="card">
    <h3>Project Features</h3>

    <ul>
        <li>Admin Authentication</li>
        <li>Cloud Log Upload</li>
        <li>MapReduce Analysis</li>
        <li>PostgreSQL Storage</li>
        <li>Neon Cloud Database</li>
    </ul>
</div>

</div>

</body>
</html>
