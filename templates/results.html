<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Analysis Results</h1>

    <table>
        <tr>
            <th>Metric</th>
            <th>Count</th>
        </tr>

        {% for key, value in results.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <a href="/dashboard">Back To Dashboard</a>

</div>

</body>
</html>
